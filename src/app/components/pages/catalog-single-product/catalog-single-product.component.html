<div class="content">
<div class="container py-5">
  <div class="card shadow-sm wow animate__zoomIn">

    <img src="{{product?.image}}" alt="">
    <div class="card-body">
      <h5 class="card-title">
        {{product?.title}}
      </h5>
      <p class="card-text">{{product?.description}}</p>
      <p class="card-text">Цена: {{product?.price}} руб.</p>
      <div class="d-flex justify-content-between align-items-center">
        <a type="button" class="btn btn-primary px-5 hvr-hollow" (click)="onClick()">Купить</a>

      </div>
    </div>
  </div>
</div>
</div>

<div *ngIf="loader" class="loader-bg">
  <div class="loader"></div>
</div>
