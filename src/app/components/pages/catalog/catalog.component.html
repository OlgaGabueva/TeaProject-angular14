

<!--Область с чаями-->


  <div class="container py-5">
    <h3 class="mb-5 text-center wow animate__swing">Наши чайные коллекции</h3>

    <div class="row row-cols-1 row-cols-sm-1 row-cols-md-3 g-3">


      <div class="col" *ngFor="let product of products" >
        <div class="card shadow-sm wow animate__zoomIn">
            <img src="{{product.image}}" alt="" >
            <div class="card-body">
               <h5 class="card-title">{{product.title}}</h5>
               <p class="card-text">{{ product.description.substring(0,250) + '...'}}</p>
               <div class="d-flex justify-content-between align-items-center">
                   <a type="button" class="btn btn-primary px-5 hvr-hollow"
                      routerLink="catalog-single-product" (click)="onClick(product)" > Подробнее </a>
               </div>
            </div>
        </div>
      </div>



      <div *ngIf="loader" class="loader-bg">
        <div class="loader">

        </div>

      </div>




    </div>
  </div>
